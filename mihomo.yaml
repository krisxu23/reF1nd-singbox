  - { name: 🔎HttpDNS, type: select, proxies: [🚫拒绝连接, 🚫静默拒绝, ⚪绕过连接] , hidden: true}
  - { name: 💧泄漏拦截, type: select, proxies: [🚫拒绝连接, 🚫静默拒绝, ⚪绕过连接] , hidden: true}
  - { name: 🎯全球直连, type: select, proxies: [🎯全局直连, 🚀全球代理] , hidden: true}



# ==================== 规则路由 ====================
rules:
  - RULE-SET,advertising-ads_domain,🪧广告拦截
  
  - OR,((RULE-SET,blockhttpdns_domain),(RULE-SET,blockhttpdns_ip,no-resolve)),🔎HttpDNS
  
  - OR,((AND,((NETWORK,TCP),(DST-PORT,5349))),(AND,((NETWORK,UDP),(DST-PORT,5350))),(AND,((NETWORK,UDP),(DST-PORT,5351))),(AND,((NETWORK,UDP),(DST-PORT,19302))),(RULE-SET,stun_domain),(DST-PORT,3478),(RULE-SET,private_domain),(RULE-SET,private_ip,no-resolve)),💧泄漏拦截

  - OR,((RULE-SET,telegram_domain),(DOMAIN-KEYWORD,nicegram)),Telegram
  
  - OR,((RULE-SET,github_domain),(DOMAIN-KEYWORD,github)),GitHub
  
  - OR,((RULE-SET,claude_domain),(RULE-SET,openai_domain),(RULE-SET,gemini_domain),(AND,((RULE-SET,copilot_domain),(NOT,((DOMAIN,www.bing.com))))),(DOMAIN-KEYWORD,openai),(DOMAIN-KEYWORD,openaicom-api),(DOMAIN-KEYWORD,colab),(DOMAIN-KEYWORD,developerprofiles),(DOMAIN-KEYWORD,generativelanguage)),OpenAI
  
  - OR,((RULE-SET,steam_domain),(DOMAIN-KEYWORD,steambroadcast),(DOMAIN-KEYWORD,steamstore),(DOMAIN-KEYWORD,steamuserimages)),Steam
  
  - RULE-SET,netflix_domain,Netflix
  
  - RULE-SET,globalmedia_domain,国际媒体

  - RULE-SET,telegram_ip,Telegram,no-resolve
  - RULE-SET,copilot_ip,OpenAI,no-resolve
  - RULE-SET,openai_ip,OpenAI,no-resolve
  - RULE-SET,netflix_ip,Netflix,no-resolve
  - RULE-SET,youtube_ip,YouTube,no-resolve
  - RULE-SET,globalmedia_ip,国际媒体,no-resolve
  - RULE-SET,cn_domain,🎯全球直连
  - RULE-SET,cn_ip,🎯全球直连

  - MATCH,🚀全球代理


